services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:${INTERNAL_QDRANT_PORT:-26333}:6333"
      - "127.0.0.1:${INTERNAL_QDRANT_GRPC_PORT:-26334}:6334"
    volumes:
      - qdrant_internal_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${INTERNAL_BACKEND_PORT:-28000}:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nlpai-lab/KoE5}
      - RERANKER_MODEL=${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - HF_HOME=/app/data/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/app/data/huggingface
      - COLLECTION_NAME=${COLLECTION_NAME:-foundation_docs}
      - CHUNK_SIZE=${CHUNK_SIZE:-800}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - TOP_K=${TOP_K:-5}
      - RERANK_CANDIDATES=${RERANK_CANDIDATES:-12}
    volumes:
      - ./runtime/internal/backend-uploads:/app/uploads
      - ./runtime/internal/backend-data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_PUBLIC_BASE_PATH=${VITE_PUBLIC_BASE_PATH:-/chat/}
    ports:
      - "${INTERNAL_FRONTEND_PORT:-28088}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_internal_data:
